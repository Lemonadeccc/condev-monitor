[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "condev-monitor"
version = "0.1.0"
description = "Python SDK for condev-monitor AI observability"
readme = "../../README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "condev-monitor" }]
dependencies = [
    "httpx>=0.27,<1.0",
]

[project.optional-dependencies]
langchain = [
    "langchain-core>=0.3,<1.0",
]

[project.scripts]
condev-monitor-tail = "condev_monitor.tailer:main"

[tool.hatch.build.targets.wheel]
packages = ["condev_monitor"]

[tool.hatch.build.targets.sdist]
include = ["condev_monitor", "pyproject.toml"]