services:
    condev-monitor-clickhouse:
        image: clickhouse:25.10
        container_name: condev-monitor-clickhouse
        ports:
            - '${CLICKHOUSE_HTTP_PORT:-8123}:8123'
            - '${CLICKHOUSE_NATIVE_PORT:-9000}:9000'
        environment:
            - CLICKHOUSE_USER=${CLICKHOUSE_USERNAME:-lemonade}
            - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-condevClickhouse}
            - CLICKHOUSE_DB=${CLICKHOUSE_DB:-lemonade}
        volumes:
            - ./clickhouse_data:/var/lib/clickhouse/
            - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
            - ./clickhouse/config.d:/etc/clickhouse-server/config.d:ro

    condev-monitor-postgres:
        image: postgres:18.1
        container_name: condev-monitor-postgres
        ports:
            - '${POSTGRES_PORT:-5432}:5432'
        environment:
            - POSTGRES_USER=${DB_USERNAME:-postgres}
            - POSTGRES_DB=${DB_DATABASE:-postgres}
            - POSTGRES_PASSWORD=${DB_PASSWORD:-condevPostgres}
        volumes:
            - ./postgresql_data:/var/lib/postgresql

    condev-monitor-kafka:
        image: apache/kafka:3.9.2
        container_name: condev-monitor-kafka
        ports:
            - '${KAFKA_EXTERNAL_PORT:-9094}:9094'
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://condev-monitor-kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-9094}
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@condev-monitor-kafka:9093
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
            KAFKA_NUM_PARTITIONS: 6
            KAFKA_DEFAULT_REPLICATION_FACTOR: 1
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        volumes:
            - ./kafka_data:/tmp/kafka-logs

networks:
    default:
        name: condev-monitor-network
        driver: bridge
